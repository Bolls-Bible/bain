# Rate limiting zone: 1920 requests/minute (~24 req/s), keyed on client IP.
# Keep burst moderate and delayed in locations below to smooth backend load.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=24r/s;

# Per-IP concurrent connection cap for API paths.
limit_conn_zone $binary_remote_addr zone=api_conn_limit:10m;

upstream django {
    server bolls-web:8000;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name NGINX_DOMAIN_NAME;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # if host is not the configured production domain, return 444 (No Response)
    if ($host != 'NGINX_DOMAIN_NAME') {
        return 444;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name NGINX_DOMAIN_NAME;
    server_tokens off; # Hide Nginx version

    ssl_certificate /etc/letsencrypt/live/NGINX_DOMAIN_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/NGINX_DOMAIN_NAME/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # if host is not the configured production domain, return 418
    if ($host != 'NGINX_DOMAIN_NAME') {
        return 418;
    }

    location ~ ^/api(?<api_path>/.*)?$ {
        return 302 https://github.com/Bolls-Bible/bain/blob/master/docs/API.md$api_path$is_args$args;
    }

    location ^~ /static/bolls/app/views/ {
        alias /home/bolls/web/static/imba/src/data/;
        try_files $uri =404;
        access_log off;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    location ^~ /reference-tool/ {
        alias /home/bolls/web/static/reference-tool/;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /assets/ {
        alias /home/bolls/web/static/imba/dist/assets/;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    # Rate-limited API/backend paths
    location ~ ^(/api|/get-*|/search/|/find/|/v2/|/dictionary-definition/) {
        # Smooth sudden bursts instead of forwarding them all at once.
        limit_req zone=api_limit burst=12 delay=8; # text nodelay later if needed
        limit_req_status 429;
        limit_conn api_conn_limit 24;
        limit_conn_status 429;

        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,X-CSRFToken,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Exact_matches' always;
        add_header "Access-Control-Max-Age" "1000" always;
        add_header "Cross-Origin-Opener-Policy" "unsafe-none" always;
        add_header "Cross-Origin-Embedder-Policy" "unsafe-none" always;
        add_header "Cross-Origin-Resource-Policy" "cross-origin" always;
        add_header "Content-Security-Policy" "cross-origin" always;
        add_header "referrer-policy" "unsafe-url" always;
        add_header "x-frame-options" "*" always;
    }

    # Other backend paths (not rate-limited)
    # location ~ ^(/admin/|/accounts/*|/login/*|/signup/|/history/|/save-bookmarks/|/delete-bookmarks/|/edit-account/|/delete-my-account/|/user-logged/|/download-notes/|/import-notes/|/save-compare-translations/|/complete/*|/disconnect/*) {
    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /home/bolls/web/static/;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    location = /favicon.ico {
        access_log off;
        alias /home/bolls/web/static/favicon.ico;
    }

    location = /robots.txt {
        access_log off;
        alias /home/bolls/web/static/robots.txt;
    }

    location ~ ^/(sw\.js|service\.worker\.js|service-worker\.js)$ {
        alias /home/bolls/web/static/sw/service.worker.js;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location /.well-known/ {
        alias /home/bolls/web/static/well-known/;
    }
}

