# Rate limiting zone: 256 requests/minute (~4.3 req/s), keyed on client IP.
# Keep burst moderate and delayed in locations below to smooth backend load.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=256r/m;

# Per-IP concurrent connection cap for API paths.
limit_conn_zone $binary_remote_addr zone=api_conn_limit:10m;

upstream django {
    server WEB_SERVICE_NAME:8000;
}
upstream node {
    server IMBA_SERVICE_NAME:3000;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name bolls.life;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name bolls.life;
    server_tokens off; # Hide Nginx version

    ssl_certificate /etc/letsencrypt/live/bolls.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bolls.life/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # if host is not bolls.life, return 418
    if ($host != 'bolls.life') {
        return 418;
    }

    location ^~ /static/bolls/app/views/ {
        alias /imba/src/data/;
        try_files $uri =404;
        access_log off;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }


    # Rate-limited API/backend paths
    location ~ ^(/api|/get-*|/search/|/find/|/v2/|/dictionary-definition/) {
        # Smooth sudden bursts instead of forwarding them all at once.
        limit_req zone=api_limit burst=64 delay=16;
        limit_req_status 429;
        limit_conn api_conn_limit 20;
        limit_conn_status 429;

        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Other backend paths (not rate-limited)
    location ~ ^(/admin/|/accounts/*|/login/*|/signup/|/history/|/save-bookmarks/|/delete-bookmarks/|/edit-account/|/delete-my-account/|/user-logged/|/download-notes/|/import-notes/|/save-compare-translations/|/complete/*|/disconnect/*) {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /home/bolls/web/static/;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    location = /favicon.ico {
        access_log off;
        alias /home/bolls/web/static/favicon.ico;
    }

    location ~ ^/(sw\.js|service\.worker\.js|service-worker\.js)$ {
        alias /imba/public/sw/service.worker.js;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://node;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }
}

