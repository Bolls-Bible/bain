# Rate limiting zone: 256 requests/minute (~4.3 req/s) with burst of 128
# Keyed on client IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=256r/m;


upstream web {
    server django:8000;
}
upstream node {
    server imba:3000;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name bolls.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bolls.local;

    ssl_certificate /etc/nginx/certs/local-cert.pem;
    ssl_certificate_key /etc/nginx/certs/local-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location ^~ /static/bolls/app/views/ {
        alias /imba/src/data/;
        try_files $uri =404;
        access_log off;
    }

    # Rate-limited API/backend paths
    location ~ ^(/api|/get-*|/search/|/find/|/v2/|/dictionary-definition/) {
        limit_req zone=api_limit burst=128 nodelay;
        limit_req_status 429;

        proxy_pass http://web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Other backend paths (not rate-limited)
    location ~ ^(/admin/|/accounts/*|/login/*|/signup/|/history/|/save-bookmarks/|/delete-bookmarks/|/edit-account/|/delete-my-account/|/user-logged/|/download-notes/|/import-notes/|/save-compare-translations/|/complete/*|/disconnect/*|/static/*) {
        proxy_pass http://web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # During development static is served with development server not from a volume.
    # location /static/ {
    #     root /home/bolls/web/static/;

    #     add_header 'Access-Control-Allow-Origin' '*' always;
    #     add_header 'Access-Control-Allow-Methods' 'GET' always;
    #     add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
    #     add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    # }
    # proxy __hmr__ requests to the node server as a websocket
    location /__hmr__ {
        proxy_pass http://node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://node;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    location = /favicon.ico {
        access_log off;
        alias /home/bolls/web/static/favicon.ico;
    }

    location ~ ^/(sw\.js|service\.worker\.js|service-worker\.js)$ {
        alias /imba/public/sw/service.worker.js;
    }
}

