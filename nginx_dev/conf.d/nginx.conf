# Rate limiting zone: 256 requests/minute (~4.3 req/s), keyed on client IP.
# Keep burst moderate and delayed in locations below to smooth backend load.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=256r/m;

# Per-IP concurrent connection cap for API paths.
limit_conn_zone $binary_remote_addr zone=api_conn_limit:10m;


upstream django {
    server web:8000;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name bolls.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bolls.local;

    ssl_certificate /etc/nginx/certs/local-cert.pem;
    ssl_certificate_key /etc/nginx/certs/local-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # if host is not bolls.local, return 418
    if ($host != 'bolls.local') {
        return 418;
    }

    location ~ ^/api(?<api_path>/.*)?$ {
        return 302 https://github.com/Bolls-Bible/bain/blob/master/docs/API.md$api_path$is_args$args;
    }

    location ^~ /static/bolls/app/views/ {
        alias /home/bolls/web/static/imba/src/data/;
        try_files $uri =404;
        access_log off;
    }

    location ^~ /assets/ {
        alias /home/bolls/web/static/imba/dist/assets/;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    # Rate-limited API/backend paths
    location ~ ^(/api|/get-*|/search/|/find/|/v2/|/dictionary-definition/) {
        # Smooth sudden bursts instead of forwarding them all at once.
        limit_req zone=api_limit burst=64 delay=16;
        limit_req_status 429;
        limit_conn api_conn_limit 20;
        limit_conn_status 429;

        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,X-CSRFToken,Content-Type,Range,Accept,Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        add_header "Access-Control-Max-Age" "1000" always;
        add_header "Cross-Origin-Opener-Policy" "unsafe-none" always;
        add_header "Cross-Origin-Embedder-Policy" "unsafe-none" always;
        add_header "Cross-Origin-Resource-Policy" "cross-origin" always;
        add_header "Content-Security-Policy" "cross-origin" always;
        add_header "referrer-policy" "unsafe-url" always;
        add_header "x-frame-options" "*" always;
    }

    location /.well-known/ {
        alias /home/bolls/web/static/well-known/;
    }

    # Other backend paths (not rate-limited)
    # location ~ ^(/admin/|/accounts/*|/login/*|/signup/|/history/|/save-bookmarks/|/delete-bookmarks/|/edit-account/|/delete-my-account/|/user-logged/|/download-notes/|/import-notes/|/save-compare-translations/|/complete/*|/disconnect/*|/static/*) {
    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Static files that should be served from the root, not from /static/ (e.g. favicon, robots.txt, webmanifest).
    location = /favicon.ico {
        access_log off;
        alias /home/bolls/web/static/favicon.ico;
    }

    location = /robots.txt {
        access_log off;
        alias /home/bolls/web/static/robots.txt;
    }

    location = /site.webmanifest {
        access_log off;
        alias /home/bolls/web/static/site.webmanifest;
    }

    location ~ ^/(sw\.js|service\.worker\.js|service-worker\.js)$ {
        alias /home/bolls/web/static/sw/service.worker.js;
    }
}

