# For development purposes only!!!
# Use with containerd + nerdctl or Podman + podman-compose.
services:
  database:
    image: docker.io/postgres:18-trixie
    restart: on-failure
    container_name: database
    environment:
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=postgres_db
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal
    shm_size: '256mb' # Matches shared_buffers below
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 512M
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=600MB
      -c work_mem=16MB

  django:
    build:
      context: ./django/
      dockerfile: Dockerfile.dev
    restart: on-failure
    command: python manage.py runserver 0:8000
    container_name: django
    volumes:
      - ./django:/code:z
    environment:
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=bolls.local 127.0.0.1 localhost
      - SQL_ENGINE=django.db.backends.postgresql
      - SQL_DATABASE=postgres_db
      - SQL_USER=postgres_user
      - SQL_PASSWORD=postgres_password
      - SQL_HOST=database
      - SQL_PORT=5432
      - DATABASE=postgres
    env_file:
      - .env.dev
    networks:
      - internal
    depends_on:
      - database
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/live/ && curl -fsS http://localhost:8000/health/ready/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 700M
        reservations:
          memory: 400M

  imba:
    build:
      context: ./django/bolls/static/imba/
      dockerfile: Dockerfile.dev
    restart: on-failure
    container_name: imba
    command: sh -c "npm i && npm run dev"
    environment:
      - API_URL=http://django:8000
    volumes:
      - ./django/bolls/static/imba:/app:z
    networks:
      - internal
    depends_on:
      - django

  nginx:
    image: nginx:stable-alpine
    restart: on-failure
    container_name: nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./django/bolls/static/:/home/bolls/web/static/:z
      - ./nginx_dev/certs:/etc/nginx/certs:ro,Z
      - ./nginx/main/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./nginx_dev/conf.d:/etc/nginx/conf.d:Z
    networks:
      - internal
    depends_on:
      django:
        condition: service_healthy

networks:
  internal:
    external: false

volumes:
  pgdata:
    driver: local
