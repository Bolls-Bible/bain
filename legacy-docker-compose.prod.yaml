# Legacy production compose file kept for reference.
# You may still use it as a reference for your deployment, but be aware that it is not actively maintained and may not reflect the current state of the production deployment. The active production deployment now uses the Podman quadlets in ./deploy/quadlets.
# Active production deployment now uses the Podman quadlets in ./deploy/quadlets.
services:
  db:
    image: docker.io/pgvector/pgvector:pg18-trixie
    restart: always
    container_name: db
    environment:
      - POSTGRES_USER=POSTGRES_USER_SECRET
      - POSTGRES_PASSWORD=POSTGRES_PASSWORD_SECRET
      - POSTGRES_DB=POSTGRES_DB_SECRET
      - PGDATA=/var/lib/postgresql/data/bolls
    networks:
      - internal
    volumes:
      - bolls_db:/var/lib/postgresql:Z
    shm_size: '256mb' # Matches shared_buffers below
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 512M
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=600MB
      -c work_mem=16MB

  web:
    image: ghcr.io/bolls-bible/bain/django:${IMAGE_TAG:-latest}
    restart: always
    # command: gunicorn bain.wsgi:application --bind 0.0.0.0:8000 -t 300
    command: gunicorn bain.wsgi:application \
      --bind 0.0.0.0:8000 \
      --workers 2 \
      --worker-tmp-dir /dev/shm \
      --max-requests 1000 \
      --max-requests-jitter 50
    container_name: web
    volumes:
      - /var/static/static_volume:/home/bolls/web/static:z
    environment:
      - DEBUG=DEBUG_SECRET
      - SECRET_KEY=SECRET_KEY_SECRET
      - DJANGO_ALLOWED_HOSTS=DJANGO_ALLOWED_HOSTS_SECRET
      - SQL_DATABASE=POSTGRES_DB_SECRET
      - SQL_USER=POSTGRES_USER_SECRET
      - SQL_PASSWORD=POSTGRES_PASSWORD_SECRET
      - SQL_HOST=db
      - SQL_PORT=5432
      - EMAIL_HOST_PASSWORD=EMAIL_HOST_PASSWORD_SECRET
      - EMAIL_HOST_USER=EMAIL_HOST_USER_SECRET
      - SOCIAL_AUTH_GOOGLE_OAUTH2_KEY=SOCIAL_AUTH_GOOGLE_OAUTH2_KEY_SECRET
      - SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET=SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET_SECRET
      - SOCIAL_AUTH_GITHUB_KEY=SOCIAL_AUTH_GITHUB_KEY_SECRET
      - SOCIAL_AUTH_GITHUB_SECRET=SOCIAL_AUTH_GITHUB_SECRET_SECRET
    networks:
      - internal
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/live/ && curl -fsS http://localhost:8000/health/ready/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  certbot:
    image: docker.io/certbot/certbot:latest
    container_name: certbot
    volumes:
      - /var/letsencrypt:/etc/letsencrypt:z
      - ./challenges:/var/www/certbot:rw,z
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"  # Renew certificates every 12 hours

  nginx:
    image: nginx:stable-alpine
    restart: always
    container_name: nginx
    environment:
      - APP_DOMAIN=NGINX_DOMAIN_NAME
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/static/static_volume:/home/bolls/web/static:ro,z
      - ./nginx/main/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./nginx/conf.d:/etc/nginx/conf.d:ro,Z
      - /var/letsencrypt:/etc/letsencrypt:ro,z
      - ./challenges:/var/www/certbot:ro,z
    networks:
      - web
      - internal
    depends_on:
      web:
        condition: service_healthy

volumes:
  bolls_db:
    driver: local

networks:
  internal:
    external: false
  web:
    name: web
    external: true
