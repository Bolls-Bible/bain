run-name: Deploy ${{ startsWith(github.ref, 'refs/heads/feat/') && github.sha || github.event.inputs.version || github.ref_name }}

on:
  push:
    tags:
      - v**
    branches:
      # - master
      - feat/**

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: '0.0.0'

jobs:
  # build:
  #   name: Build and Push Docker Image to GitHub Container Registry
  #   runs-on: ubuntu-latest
  #   environment: prod
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: build django image for ghcr
  #       run: |
  #         echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
  #         REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
  #         if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == feat/* ]]; then
  #           IMAGE_TAG="${GITHUB_SHA}"
  #         else
  #           IMAGE_TAG="${{ github.event.inputs.version || github.ref_name }}"
  #         fi
  #         docker build \
  #           -t ghcr.io/$REPO_LOWER/django:latest \
  #           -t ghcr.io/$REPO_LOWER/django:$IMAGE_TAG \
  #           -f ./django/Dockerfile ./django
  #         docker push ghcr.io/$REPO_LOWER/django:latest
  #         docker push ghcr.io/$REPO_LOWER/django:$IMAGE_TAG

  deploy:
    name: Deploy to Podman Quadlets
    runs-on: [self-hosted, fedora, Linux, X64]
    # needs: build
    environment: prod
    env:
      DEBUG_SECRET: ${{ secrets.DEBUG_SECRET }}
      NGINX_DOMAIN_NAME: ${{ secrets.NGINX_DOMAIN_NAME }}
      POSTGRES_DB_SECRET: ${{ secrets.POSTGRES_DB_SECRET }}
      POSTGRES_PASSWORD_SECRET: ${{ secrets.POSTGRES_PASSWORD_SECRET }}
      POSTGRES_USER_SECRET: ${{ secrets.POSTGRES_USER_SECRET }}
      SECRET_KEY_SECRET: ${{ secrets.SECRET_KEY_SECRET }}
      DJANGO_ALLOWED_HOSTS_SECRET: ${{ vars.DJANGO_ALLOWED_HOSTS_SECRET }}
      EMAIL_HOST_PASSWORD_SECRET: ${{ secrets.EMAIL_HOST_PASSWORD_SECRET }}
      EMAIL_HOST_USER_SECRET: ${{ secrets.EMAIL_HOST_USER_SECRET }}
      SOCIAL_AUTH_GOOGLE_OAUTH2_KEY_SECRET: ${{ secrets.SOCIAL_AUTH_GOOGLE_OAUTH2_KEY_SECRET }}
      SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET_SECRET: ${{ secrets.SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET_SECRET }}
      SOCIAL_AUTH_GITHUB_KEY_SECRET: ${{ secrets.SOCIAL_AUTH_GITHUB_KEY_SECRET }}
      SOCIAL_AUTH_GITHUB_SECRET_SECRET: ${{ secrets.SOCIAL_AUTH_GITHUB_SECRET_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy on VPS runner
        shell: bash
        run: |
          set -euo pipefail

          REPO_DIR="$GITHUB_WORKSPACE"
          APP_DOMAIN="${NGINX_DOMAIN_NAME:-dev.bolls.life}"
          # if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == feat/* ]]; then
          #   IMAGE_TAG="${GITHUB_SHA}"
          # else
          #   IMAGE_TAG="${{ github.event.inputs.version || github.ref_name }}"
          # fi
          IMAGE_TAG="v3.3.4b"

          DEPLOY_BASE="$HOME/.local/share/bolls"
          QUADLET_DIR="$HOME/.config/containers/systemd"
          ENV_DIR="$HOME/.config/bolls"
          STATIC_DIR="$DEPLOY_BASE/static_volume"
          LETSENCRYPT_DIR="$DEPLOY_BASE/letsencrypt"
          POSTGRES_DIR="$DEPLOY_BASE/postgres"
          CONFIG_ROOT="$DEPLOY_BASE/config"
          CHALLENGES_DIR="$REPO_DIR/challenges"
          RUNNER_UID="$(id -u)"
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$RUNNER_UID}"
          
          if ! systemctl --user show-environment >/dev/null 2>&1; then
            echo "User systemd is not available for the runner account."
            echo "Enable lingering once on the VPS for $(id -un) using 'sudo loginctl enable-linger $(id -un)', then rerun the deploy."
            exit 1
          fi

          export DBUS_SESSION_BUS_ADDRESS="unix:path=$XDG_RUNTIME_DIR/bus"

          cd "$REPO_DIR"
          mkdir -p "$QUADLET_DIR" "$ENV_DIR" "$STATIC_DIR" "$LETSENCRYPT_DIR" "$POSTGRES_DIR" \
            "$CONFIG_ROOT/nginx/main" "$CONFIG_ROOT/nginx/conf.d" "$CHALLENGES_DIR" "$HOME/.config/containers"

          echo "Configuring Podman for the runner service..."
          cat > "$HOME/.config/containers/containers.conf" <<'EOF'
          [engine]
          cgroup_manager="cgroupfs"
          events_logger="file"
          EOF

          echo "Writing production environment..."
          cat > "$ENV_DIR/bolls-dev.env" <<EOF
          APP_DOMAIN=$APP_DOMAIN
          DEBUG=$DEBUG_SECRET
          SECRET_KEY=$SECRET_KEY_SECRET
          DJANGO_ALLOWED_HOSTS=$DJANGO_ALLOWED_HOSTS_SECRET
          POSTGRES_DB=$POSTGRES_DB_SECRET
          POSTGRES_USER=$POSTGRES_USER_SECRET
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD_SECRET
          SQL_DATABASE=$POSTGRES_DB_SECRET
          SQL_USER=$POSTGRES_USER_SECRET
          SQL_PASSWORD=$POSTGRES_PASSWORD_SECRET
          SQL_HOST=bolls-dev-db
          SQL_PORT=5432
          EMAIL_HOST_USER=$EMAIL_HOST_USER_SECRET
          EMAIL_HOST_PASSWORD=$EMAIL_HOST_PASSWORD_SECRET
          SOCIAL_AUTH_GOOGLE_OAUTH2_KEY=$SOCIAL_AUTH_GOOGLE_OAUTH2_KEY_SECRET
          SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET=$SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET_SECRET
          SOCIAL_AUTH_GITHUB_KEY=$SOCIAL_AUTH_GITHUB_KEY_SECRET
          SOCIAL_AUTH_GITHUB_SECRET=$SOCIAL_AUTH_GITHUB_SECRET_SECRET
          EOF
          chmod 600 "$ENV_DIR/bolls-dev.env"

          echo "Preparing nginx for $APP_DOMAIN..."
          cp nginx/main/nginx.conf "$CONFIG_ROOT/nginx/main/nginx.conf"
          sed "s/NGINX_DOMAIN_NAME/$APP_DOMAIN/g" nginx/conf.d/nginx.conf > "$CONFIG_ROOT/nginx/conf.d/nginx.conf"

          curl -fsSL https://raw.githubusercontent.com/certbot/certbot/master/certbot-nginx/certbot_nginx/_internal/tls_configs/options-ssl-nginx.conf > "$LETSENCRYPT_DIR/options-ssl-nginx.conf"
          curl -fsSL https://raw.githubusercontent.com/certbot/certbot/master/certbot/certbot/ssl-dhparams.pem > "$LETSENCRYPT_DIR/ssl-dhparams.pem"

          APP_DOMAIN="$APP_DOMAIN" LETSENCRYPT_DIR="$LETSENCRYPT_DIR" sh ./init-certs/check-certs.sh

          echo "Installing quadlets..."
          for unit in bolls-dev.network bolls-dev-db.container bolls-dev-nginx.container bolls-dev-certbot-init.container bolls-dev-certbot-renew.container; do
            sed \
              -e "s|ENV_FILE_PATH|$ENV_DIR/bolls-dev.env|g" \
              -e "s|POSTGRES_HOST_PATH|$POSTGRES_DIR|g" \
              -e "s|STATIC_HOST_PATH|$STATIC_DIR|g" \
              -e "s|LETSENCRYPT_HOST_PATH|$LETSENCRYPT_DIR|g" \
              -e "s|CHALLENGES_HOST_PATH|$CHALLENGES_DIR|g" \
              -e "s|NGINX_MAIN_HOST_PATH|$CONFIG_ROOT/nginx/main/nginx.conf|g" \
              -e "s|NGINX_CONFD_HOST_PATH|$CONFIG_ROOT/nginx/conf.d|g" \
              "deploy/quadlets/$unit" > "$QUADLET_DIR/$unit"
          done
          sed \
            -e "s|IMAGE_TAG_PLACEHOLDER|$IMAGE_TAG|g" \
            -e "s|ENV_FILE_PATH|$ENV_DIR/bolls-dev.env|g" \
            -e "s|POSTGRES_HOST_PATH|$POSTGRES_DIR|g" \
            -e "s|STATIC_HOST_PATH|$STATIC_DIR|g" \
            -e "s|LETSENCRYPT_HOST_PATH|$LETSENCRYPT_DIR|g" \
            -e "s|CHALLENGES_HOST_PATH|$CHALLENGES_DIR|g" \
            -e "s|NGINX_MAIN_HOST_PATH|$CONFIG_ROOT/nginx/main/nginx.conf|g" \
            -e "s|NGINX_CONFD_HOST_PATH|$CONFIG_ROOT/nginx/conf.d|g" \
            deploy/quadlets/bolls-dev-web.container > "$QUADLET_DIR/bolls-dev-web.container"

          echo "Pulling release image: $IMAGE_TAG"
          podman pull ghcr.io/bolls-bible/bain/django:$IMAGE_TAG

          echo "Reloading systemd and starting services..."
          systemctl --user daemon-reload
          systemctl --user start bolls-dev-network.service
          systemctl --user restart bolls-dev-db.service
          systemctl --user restart bolls-dev-web.service
          systemctl --user restart bolls-dev-nginx.service

          echo "Requesting TLS certificate for $APP_DOMAIN..."
          systemctl --user start bolls-dev-certbot-init.service || true
          systemctl --user restart bolls-dev-certbot-renew.service
          systemctl --user restart bolls-dev-nginx.service

          echo "Applying DB extensions..."
          podman cp ./sql/unaccent_plus.rules bolls-dev-db:/usr/share/postgresql/18/tsearch_data/unaccent_plus.rules
          podman exec bolls-dev-db psql -U "$POSTGRES_USER_SECRET" -d "$POSTGRES_DB_SECRET" -c "CREATE EXTENSION IF NOT EXISTS unaccent;"
          podman exec bolls-dev-db psql -U "$POSTGRES_USER_SECRET" -d "$POSTGRES_DB_SECRET" -c "ALTER TEXT SEARCH DICTIONARY unaccent (RULES='unaccent_plus')"
          podman exec bolls-dev-db psql -U "$POSTGRES_USER_SECRET" -d "$POSTGRES_DB_SECRET" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

          echo "Running tests..."
          podman exec bolls-dev-web python manage.py test --keepdb
          echo "Done."
