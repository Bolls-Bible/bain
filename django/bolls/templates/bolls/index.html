{% load static %} {% load i18n %}
<!DOCTYPE html>
<html lang="en" data-transitions="false" style="color-scheme: dark light;">
  <head>
    <meta charset="UTF-8" />
    <title>Bolls Bible</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{% static 'apple-touch-icon.png' %}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{% static 'favicon-32x32.png' %}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{% static 'favicon-16x16.png' %}"
    />
    <link rel="manifest" href="{% static 'site.webmanifest' %}" />
    {% if translation %}
    <link
      rel="canonical"
      href="https://bolls.life/{{translation}}/{{book}}/{{chapter}}/"
    />
    {% endif %}
    <meta property="og:site_name" content="Bolls Bible" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="viewport"
      content="width=device-width,minimum-scale=1,maximum-scale=5,initial-scale=1"
    />
    {% if description %}
    <meta name="description" content="{{ description }}" />
    <meta property="og:description" content="{{ description }}" />
    {% else %}
    <meta
      name="description"
      content="A web app for reading the Bible with full emphasis on the God`s Word only. Sola scriptura"
    />
    <meta
      property="og:description"
      content="A web app for reading the Bible with full emphasis on the God`s Word only. Sola scriptura"
    />
    {% endif %}
    <meta property="og:title" content="Bolls Bible" />
    <meta property="og:image" content="{% static 'bolls.png' %}" />
    <meta name="theme-color" content="#04060c" />
    <meta name="twitter:card" content="app" />
    <meta name="twitter:title" content="Bolls Bible" />
    <meta name="twitter:image:src" content="{% static 'bolls.png' %}" />
    <meta name="twitter:image:alt" content="Bolls Bible" />
    <meta name="twitter:app:name:googleplay" content="Bolls" />
    <meta name="twitter:app:id:googleplay" content="life.bolls.bolls" />
    <script>
      {% if message %}
      	window.message = "{{ message }}";{% endif %}
      {%if translation %}
      	window.translation = "{{ translation }}";
      	window.book = {{ book}};
      	window.chapter = {{ chapter }};
      	window.verses = {{ verses | safe }};
      	{% if verse %}
      		window.verse = {{ verse }};
      		{% if endverse %}
      			window.endverse = {{ endverse }};
            {% endif %}
        {% endif %}
    {% endif %}
    </script>
    <script src="{% static 'sw/dexie.min.js' %}"></script>

    {% comment %} how to we load dynamically generated styleshees? {% endcomment %}
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ imba_css }}"
    />
    <script
      type="module"
      src="{{ imba_js }}"
    ></script>
  </head>

  <body>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").then(
            function (registration) {
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope
              );
              registration.update();
            },
            function (err) {
              console.warn("ServiceWorker registration failed: ", err);
            }
          );
        });
      }
    </script>
    <noscript>
      <p style="color: var(--c)">
        {% trans "Unfortunately, this site requires JavaScript that is disabled
        in your browser :(" %}
      </p>
    </noscript>
  </body>
</html>
